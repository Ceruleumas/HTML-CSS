<!DOCTYPE html>
<hmtl lang="pt-br">
    <head>
        <meta charset="ISO-8859-1">
        <meta name="viewport" content="width=devide-width, initial-scale=1.0">
        <title>Mídias em HTML5</title>
    </head>
    <body>
        <h1>Imagens dinâmicas</h1>
        <p>Tente abrir esse site em diferentes disposivos ou simplesmente aumente e diminua o tamanho do seu navegador.</p>

        <picture>
            <source media="(max-width: 750px)" srcset="imagens/foto-p.png" type="image/png" />
            <source media="(max-width: 1050px)" srcset="imagens/foto-m.png" type="image/png" />
            <img src="imagens/foto-g.png" alt="Imagem flexível" />
        </picture>
        <h1>Reproduzindo áudio</h1>
        <p>Vamos aprender a reproduzir áudios</p>
        <audio controls autoplay loop>
            <source src="midia/bones.mp3" type="audio/mp3" />
        </audio>
    </body>
</hmtl>
