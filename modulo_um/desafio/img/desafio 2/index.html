<!DOCTYPE html>
<hmtl lang="pt-br">
    <head>
        <meta charset="ISO-8859-1">
        <meta name="viewport" content="width=devide-width, initial-scale=1.0">
        <title>Tags HTML</title>
    </head>
    <body>
        <h1>Tags em HTML</h1>
        Em HTML5, podemos inserir os elementos da lista a seguir. Passe o mouse sobre os termos para descobrir qual tag deverá utilizar em cada caso.
        <ul type="square">
            <li><dfn id="Parágrafos"></dfn><abbr title="Use a tag <p>"</abbr>Parágrafos</li>
            <li><dfn id="Títulos"></dfn><abbr title="Use as tags <h1>...<h6>"</abbr>Títulos</li>
            <li><dfn id="Imagens"></dfn><abbr title="Use a tag <img>"</abbr>Imagens</li>
            <li><dfn id="Abreviações"></dfn><abbr title="Use a tag <abbr>"</abbr>Abreviações</li>
            <li><dfn id="Códigos-fonte"></dfn><abbr title="Use a tag <code>"</abbr>Códigos-fonte</li>
            <li><dfn id="Listas numeradas"></dfn><abbr title="Use as tags <ol> e <li>"</abbr>Listas numeradas</li>
            <li><dfn id="Listas com demarcadores"></dfn><abbr title="Use as tags <ul> e <li>"</abbr>Listas com demarcadores</li>
        </ul>
    </body>
</hmtl>
