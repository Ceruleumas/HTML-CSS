<!DOCTYPE html>
<hmtl lang="pt-br">
    <head>
        <meta charset="ISO-8859-1">
        <meta name="viewport" content="width=devide-width, initial-scale=1.0">
        <title>Vídeos com html</title>
    </head>
    <body>
        <h1>Inserindo vídeos hospedados localmente</h1>
        <p>Este vídeo está hospedado no meu próprio servidor</p>
        <video controls poster="midia/imagem.jpg" width="300" height="450">
            <source src="midia/video.m4v" type="video/mp4" />
            <source src="midia/video.webm" type="image/webp" />
        </video>
        <h1>Inserindo vídeos do Youtube</h1>
        <iframe width="560" height="315" src="https://www.youtube.com/embed/FdE5G95B7Mg" title="YouTube video player" frameborder="0" allow="accelerometer; autoplay; clipboard-write; encrypted-media; gyroscope; picture-in-picture" allowfullscreen></iframe>
        <h1>Inserindo vídeos do Vimeo</h1>
        <iframe src="https://player.vimeo.com/video/197093965?h=7fbc516b5a&byline=0" width="640" height="360" frameborder="0" allow="autoplay; fullscreen; picture-in-picture" allowfullscreen></iframe>
    </body>
</hmtl>
